<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Sign In Page</title>
</head>
<body>
    <style>
        body{

            background-image: url(https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTPt7l_GsD8BzfeOD19LEPHDJVzcOCF2vpwM9ifkv06lg&s);

      <div align="center">
    <h2>Sign In Form </h2> <br> <hr> 

    <table cellpadding="10" cellspacing="0" border="0"> 

        <tr>
            <td>Email</td>
            <td><input type="email" name="email" placeholder="Enter your email" required></td> <br>
             
        </tr>

        <tr>
         <td></td>
         <td> <button>Save Email ID</button></td>  
        </tr>
        
        <tr>
             <td>Password</td>
             <td><input type="password" name="password" placeholder="Enter your password" required></td>
        </tr>

        <tr>
            <td></td>
            <td><button>Save Password</button></td>

        </tr>
        
        <tr>
            <td> Enter Full Name</td>
            <td><input type="text" name="fullname" placeholder="Enter your full name" required></td>
        </tr>

        <tr>
            <td></td>
            <td><button>Submit</button></td>

        </tr>

        <tr>
            <td>Enter Phone Number</td>
            <td><input type="tel" name="phone" placeholder="Enter your phone number" required></td>
        </tr>

        <tr>
            <td></td>
            <td><button>Submit</button></td>
         </tr>

         <tr>
            <td>Gender</td>
            <td> <input type="radio" name="gender" value="male" required> Male
                <input type="radio" name="gender" value="female" required> Female </td>
         </tr>

         <tr>
            <td></td>
            <td><button>Submit</button></td>

            </tr>

            <tr>
                <td>Enter Date of Birth</td>
                <td><input type="date" name="dob" required></td>
            </tr>

            <tr>
                <td></td>
                <td><button>Submit</button></td>
                </tr>

                <tr>
                    <td>Enter City</td>
                    <td> <select>  <option>Select City</option>
                        <OPTION>Pune</OPTION>
                        <OPTION>Solapur</OPTION>
                        <OPTION>Mumbai</OPTION>
                        <OPTION>Nashik</OPTION>
                    
                    </select></td>
                </tr>

                <tr>
                    <td></td>
                    <td><button>Submit Form</button></td>
    </table>


         

</div>
